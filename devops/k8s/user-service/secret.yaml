apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
  namespace: ostora
  labels:
    app: user-service
type: Opaque
stringData:
  database-url: "postgresql://user:password@postgres:5432/ostora?schema=public"
  redis-password: "your-redis-password"
  aws-access-key-id: "your-aws-access-key-id"
  aws-secret-access-key: "your-aws-secret-access-key"
  email-encryption-key: "your-32-character-encryption-key"
  jwt-secret: "your-jwt-secret-key"
---
# Note: In production, use external secret management like:
# - AWS Secrets Manager
# - HashiCorp Vault
# - Sealed Secrets
# - External Secrets Operator
