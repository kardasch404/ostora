apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-service-uploads-pvc
  namespace: ostora
  labels:
    app: user-service
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: aws-efs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: user-service-uploads-pv
  labels:
    app: user-service
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: aws-efs
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-12345678::fsap-12345678
