apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service
  namespace: ostora
  labels:
    app: user-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: user-service-role
  namespace: ostora
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-service-rolebinding
  namespace: ostora
subjects:
- kind: ServiceAccount
  name: user-service
  namespace: ostora
roleRef:
  kind: Role
  name: user-service-role
  apiGroup: rbac.authorization.k8s.io
