apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: ostora
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: ostora/ai-service:latest
        ports:
        - containerPort: 4723
        env:
        - name: PORT
          value: "4723"
        - name: BLAZEAI_API_URL
          value: "https://blazeai.boxu.dev"
        - name: BLAZEAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-secrets
              key: blazeai-api-key
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: postgres-url
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: ostora
spec:
  selector:
    app: ai-service
  ports:
  - port: 4723
    targetPort: 4723
  type: ClusterIP
