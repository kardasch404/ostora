apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ostora-staging
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: auth-service
        image: your-registry/ostora-auth-service:latest
        env:
        - name: NODE_ENV
          value: "staging"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: ostora-staging
spec:
  minReplicas: 1
  maxReplicas: 5
