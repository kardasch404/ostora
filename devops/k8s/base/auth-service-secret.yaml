apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: ostora
type: Opaque
stringData:
  DATABASE_URL: "postgresql://ostora:password@postgres-service:5432/ostora"
  JWT_SECRET: "your-jwt-secret-key-change-in-production"
  REDIS_PASSWORD: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  LINKEDIN_CLIENT_ID: ""
  LINKEDIN_CLIENT_SECRET: ""
