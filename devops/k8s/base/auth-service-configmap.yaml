apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: ostora
data:
  PORT: "4718"
  NODE_ENV: "production"
  CORS_ORIGIN: "https://ostora.com"
  JWT_ACCESS_EXPIRY: "15m"
  JWT_REFRESH_EXPIRY: "7d"
  BCRYPT_ROUNDS: "10"
  MAX_LOGIN_ATTEMPTS: "5"
  LOCKOUT_DURATION: "900"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  KAFKA_BROKER: "kafka-service:9092"
  LOG_LEVEL: "info"
