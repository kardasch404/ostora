apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ostora
  labels:
    app: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: your-registry/ostora-api-gateway:latest
        ports:
        - containerPort: 4717
        envFrom:
        - configMapRef:
            name: ostora-config
        - secretRef:
            name: ostora-secrets
        env:
        - name: PORT
          value: "4717"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4717
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4717
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: ostora
spec:
  selector:
    app: api-gateway
  ports:
  - protocol: TCP
    port: 80
    targetPort: 4717
  type: LoadBalancer
