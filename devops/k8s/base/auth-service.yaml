apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ostora
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: your-registry/ostora-auth-service:latest
        ports:
        - containerPort: 4718
        envFrom:
        - configMapRef:
            name: ostora-config
        - secretRef:
            name: ostora-secrets
        env:
        - name: PORT
          value: "4718"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ostora
spec:
  selector:
    app: auth-service
  ports:
  - protocol: TCP
    port: 4718
    targetPort: 4718
  type: ClusterIP
