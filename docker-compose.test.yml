version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: ostora-postgres-test
    environment:
      POSTGRES_USER: ostora_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: ostora_test
    ports:
      - "5446:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ostora_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: ostora-redis-test
    ports:
      - "6346:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-test-data:
