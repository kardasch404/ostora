version: '3.9'

services:
  # ==================== DATABASES ====================
  postgres:
    image: postgres:16-alpine
    container_name: ostora-postgres
    environment:
      POSTGRES_USER: ostora
      POSTGRES_PASSWORD: ostora_secret_2024
      POSTGRES_DB: ostora_db
    ports:
      - "5445:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ostora-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ostora"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: ostora-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_secret_2024
      MYSQL_DATABASE: ostora_analytics
      MYSQL_USER: ostora
      MYSQL_PASSWORD: ostora_secret_2024
    ports:
      - "3345:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ostora-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: ostora-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ostora
      MONGO_INITDB_ROOT_PASSWORD: ostora_secret_2024
      MONGO_INITDB_DATABASE: ostora_logs
    ports:
      - "27045:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ostora-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ostora-redis
    command: redis-server --requirepass ostora_redis_2024
    ports:
      - "6345:6379"
    volumes:
      - redis_data:/data
    networks:
      - ostora-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: ostora-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9245:9200"
      - "9345:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ostora-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== MESSAGE BROKER ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: ostora-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ostora-network

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: ostora-kafka
    depends_on:
      - zookeeper
    ports:
      - "9095:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - ostora-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: ostora-kafdrop
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
    networks:
      - ostora-network

  # ==================== MICROSERVICES ====================
  api-gateway:
    build:
      context: .
      dockerfile: ./infra/docker/api-gateway.Dockerfile
    container_name: ostora-api-gateway
    ports:
      - "4717:4717"
    environment:
      NODE_ENV: development
      PORT: 4717
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ostora_redis_2024
    depends_on:
      - redis
      - kafka
    networks:
      - ostora-network
    volumes:
      - ./apps/api-gateway:/app/apps/api-gateway
      - ./libs:/app/libs
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: ./infra/docker/auth-service.Dockerfile
    container_name: ostora-auth-service
    ports:
      - "4718:4718"
    environment:
      NODE_ENV: development
      PORT: 4718
      DATABASE_URL: postgresql://ostora:ostora_secret_2024@postgres:5432/ostora_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ostora_redis_2024
      KAFKA_BROKER: kafka:29092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - ostora-network
    volumes:
      - ./apps/auth-service:/app/apps/auth-service
      - ./libs:/app/libs
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: ./infra/docker/user-service.Dockerfile
    container_name: ostora-user-service
    ports:
      - "4719:4719"
    environment:
      NODE_ENV: development
      PORT: 4719
      DATABASE_URL: postgresql://ostora:ostora_secret_2024@postgres:5432/ostora_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ostora_redis_2024
      KAFKA_BROKER: kafka:29092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - ostora-network
    volumes:
      - ./apps/user-service:/app/apps/user-service
      - ./libs:/app/libs
    restart: unless-stopped

  job-service:
    build:
      context: .
      dockerfile: ./infra/docker/job-service.Dockerfile
    container_name: ostora-job-service
    ports:
      - "4720:4720"
    environment:
      NODE_ENV: development
      PORT: 4720
      DATABASE_URL: postgresql://ostora:ostora_secret_2024@postgres:5432/ostora_db
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ostora_redis_2024
      KAFKA_BROKER: kafka:29092
    depends_on:
      - postgres
      - elasticsearch
      - redis
      - kafka
    networks:
      - ostora-network
    volumes:
      - ./apps/job-service:/app/apps/job-service
      - ./libs:/app/libs
    restart: unless-stopped

  email-service:
    build:
      context: .
      dockerfile: ./infra/docker/email-service.Dockerfile
    container_name: ostora-email-service
    ports:
      - "4721:4721"
    environment:
      NODE_ENV: development
      PORT: 4721
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ostora_redis_2024
      KAFKA_BROKER: kafka:29092
    depends_on:
      - redis
      - kafka
    networks:
      - ostora-network
    volumes:
      - ./apps/email-service:/app/apps/email-service
      - ./libs:/app/libs
    restart: unless-stopped

  scraping-service:
    build:
      context: .
      dockerfile: ./infra/docker/scraping-service.Dockerfile
    container_name: ostora-scraping-service
    ports:
      - "4722:4722"
    environment:
      NODE_ENV: development
      PORT: 4722
      DATABASE_URL: postgresql://ostora:ostora_secret_2024@postgres:5432/ostora_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ostora_redis_2024
      KAFKA_BROKER: kafka:29092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - ostora-network
    volumes:
      - ./apps/scraping-service:/app/apps/scraping-service
      - ./scripts/scraper:/app/scripts/scraper
      - ./libs:/app/libs
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: ./infra/docker/ai-service.Dockerfile
    container_name: ostora-ai-service
    ports:
      - "4723:4723"
    environment:
      NODE_ENV: development
      PORT: 4723
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ostora_redis_2024
      KAFKA_BROKER: kafka:29092
    depends_on:
      - redis
      - kafka
    networks:
      - ostora-network
    volumes:
      - ./apps/ai-service:/app/apps/ai-service
      - ./libs:/app/libs
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: ./infra/docker/payment-service.Dockerfile
    container_name: ostora-payment-service
    ports:
      - "4724:4724"
    environment:
      NODE_ENV: development
      PORT: 4724
      DATABASE_URL: postgresql://ostora:ostora_secret_2024@postgres:5432/ostora_db
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ostora_redis_2024
      KAFKA_BROKER: kafka:29092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - ostora-network
    volumes:
      - ./apps/payment-service:/app/apps/payment-service
      - ./libs:/app/libs
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: ./infra/docker/analytics-service.Dockerfile
    container_name: ostora-analytics-service
    ports:
      - "4725:4725"
    environment:
      NODE_ENV: development
      PORT: 4725
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ostora
      MYSQL_PASSWORD: ostora_secret_2024
      MYSQL_DATABASE: ostora_analytics
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ostora_redis_2024
      KAFKA_BROKER: kafka:29092
    depends_on:
      - mysql
      - redis
      - kafka
    networks:
      - ostora-network
    volumes:
      - ./apps/analytics-service:/app/apps/analytics-service
      - ./libs:/app/libs
    restart: unless-stopped

  b2b-service:
    build:
      context: .
      dockerfile: ./infra/docker/b2b-service.Dockerfile
    container_name: ostora-b2b-service
    ports:
      - "4726:4726"
    environment:
      NODE_ENV: development
      PORT: 4726
      DATABASE_URL: postgresql://ostora:ostora_secret_2024@postgres:5432/ostora_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ostora_redis_2024
      KAFKA_BROKER: kafka:29092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - ostora-network
    volumes:
      - ./apps/b2b-service:/app/apps/b2b-service
      - ./libs:/app/libs
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: ./infra/docker/notification-service.Dockerfile
    container_name: ostora-notification-service
    ports:
      - "4727:4727"
    environment:
      NODE_ENV: development
      PORT: 4727
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ostora_redis_2024
      KAFKA_BROKER: kafka:29092
    depends_on:
      - redis
      - kafka
    networks:
      - ostora-network
    volumes:
      - ./apps/notification-service:/app/apps/notification-service
      - ./libs:/app/libs
    restart: unless-stopped

  networking-service:
    build:
      context: .
      dockerfile: ./infra/docker/networking-service.Dockerfile
    container_name: ostora-networking-service
    ports:
      - "4728:4728"
    environment:
      NODE_ENV: development
      PORT: 4728
      DATABASE_URL: postgresql://ostora:ostora_secret_2024@postgres:5432/ostora_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ostora_redis_2024
      KAFKA_BROKER: kafka:29092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - ostora-network
    volumes:
      - ./apps/networking-service:/app/apps/networking-service
      - ./libs:/app/libs
    restart: unless-stopped

networks:
  ostora-network:
    driver: bridge

volumes:
  postgres_data:
  mysql_data:
  mongodb_data:
  redis_data:
  elasticsearch_data:
