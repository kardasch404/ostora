version: '3.8'

services:
  # ==================== Databases ====================
  
  postgres:
    image: postgres:16-alpine
    container_name: ostora-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ostora
    ports:
      - "5445:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ostora-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: ostora-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stellen
    ports:
      - "3345:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ostora-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: ostora-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
    ports:
      - "27045:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ostora-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ostora-redis
    ports:
      - "6345:6379"
    volumes:
      - redis_data:/data
    networks:
      - ostora-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ostora-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9245:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ostora-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== Kafka Stack ====================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ostora-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ostora-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ostora-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9095:9095"
    networks:
      - ostora-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9095"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: ostora-kafdrop
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
    ports:
      - "9000:9000"
    networks:
      - ostora-network

  # ==================== Microservices ====================
  
  api-gateway:
    build:
      context: .
      dockerfile: ./devops/docker/api-gateway.Dockerfile
    container_name: ostora-api-gateway
    environment:
      PORT: 4717
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKER: kafka:29092
      JOB_SERVICE_URL: http://job-service:4720
      USER_SERVICE_URL: http://user-service:4719
    ports:
      - "4717:4717"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started
      job-service:
        condition: service_started
    networks:
      - ostora-network
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: ./devops/docker/auth-service.Dockerfile
    container_name: ostora-auth-service
    environment:
      PORT: 4718
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:8080
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ostora
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_ENABLED: "true"
      KAFKA_BROKER: kafka:29092
      JWT_ACCESS_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      GOOGLE_CLIENT_ID: placeholder-google-client-id
      GOOGLE_CLIENT_SECRET: placeholder-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:4718/api/v1/auth/google/callback
      GITHUB_CLIENT_ID: placeholder-github-client-id
      GITHUB_CLIENT_SECRET: placeholder-github-client-secret
      GITHUB_CALLBACK_URL: http://localhost:4718/api/v1/auth/github/callback
      LINKEDIN_CLIENT_ID: placeholder-linkedin-client-id
      LINKEDIN_CLIENT_SECRET: placeholder-linkedin-client-secret
      LINKEDIN_CALLBACK_URL: http://localhost:4718/api/v1/auth/linkedin/callback
    ports:
      - "4718:4718"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ostora-network
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: ./devops/docker/user-service.Dockerfile
    container_name: ostora-user-service
    environment:
      PORT: 4719
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ostora
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: ostora-documents
    ports:
      - "4719:4719"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ostora-network
    restart: unless-stopped

  job-service:
    build:
      context: .
      dockerfile: ./devops/docker/job-service.Dockerfile
    container_name: ostora-job-service
    environment:
      PORT: 4720
      NODE_ENV: production
      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: 
      MYSQL_DATABASE: stellen
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "4720:4720"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ostora-network
    restart: unless-stopped

  email-service:
    build:
      context: .
      dockerfile: ./devops/docker/email-service.Dockerfile
    container_name: ostora-email-service
    environment:
      PORT: 4721
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ostora
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKER: kafka:29092
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: "false"
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      ALLOW_SES_FALLBACK: "false"
    ports:
      - "4721:4721"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ostora-network
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ostora-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - ostora-network
    restart: unless-stopped

  scraping-service:
    build:
      context: ./apps/scraping-service
      dockerfile: ../../devops/docker/Dockerfile.scraping
    container_name: ostora-scraping-service
    environment:
      PORT: 4722
      NODE_ENV: production
      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: 
      MYSQL_DATABASE: stellen
    ports:
      - "4722:4722"
    networks:
      - ostora-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ostora-frontend
    environment:
      NODE_ENV: production
      PORT: 6000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4717
      NEXT_PUBLIC_AUTH_API_BASE_URL: http://localhost:4718/api/v1/auth
      NEXT_SERVER_API_BASE_URL: http://api-gateway:4717
    ports:
      - "8080:6000"
    networks:
      - ostora-network
    restart: unless-stopped

networks:
  ostora-network:
    driver: bridge

volumes:
  postgres_data:
  mysql_data:
  mongodb_data:
  redis_data:
  elasticsearch_data:
